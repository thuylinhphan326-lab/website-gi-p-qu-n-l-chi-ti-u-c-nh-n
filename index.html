<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget Planner - Quản lý chi tiêu cá nhân</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="container">

            <h1>💰 Budget Planner</h1>

            <p>
                Quản lý chi tiêu thông minh theo độ tuổi, hoàn cảnh và thu nhập
            </p>

        </div>

    </header>

    <!-- MAIN -->
    <main class="container">

        <div class="card">

            <h2>Thông tin cá nhân</h2>

            <!-- Đối tượng -->
            <div class="form-group">

                <label for="userType">

                    Bạn thuộc nhóm nào?

                </label>

                <select id="userType">

                    <option value="">-- Chọn đối tượng --</option>

                    <option value="student">
                        Học sinh (11–17 tuổi)
                    </option>

                    <option value="college">
                        Sinh viên
                    </option>

                    <option value="worker">
                        Người đi làm
                    </option>

                </select>

            </div>

            <!-- Phần hiển thị động -->
            <div id="dynamicFields"></div>

            <!-- Ngân sách -->
            <div class="form-group">

                <label for="budget">

                    Ngân sách dự kiến mỗi tháng (VNĐ)

                </label>

                <input
                    type="number"
                    id="budget"
                    placeholder="Ví dụ: 5000000">

            </div>

            <!-- Button -->
            <button id="generateBtn">

                📊 Lập kế hoạch chi tiêu

            </button>

        </div>

        <!-- Kết quả -->

        <section id="resultSection">

            <div class="welcome">

                <h2>👋 Chào mừng bạn!</h2>

                <p>

                    Hãy chọn đối tượng và nhập ngân sách để nhận kế hoạch chi tiêu phù hợp.

                </p>

            </div>

        </section>

    </main>

    <!-- FOOTER -->

    <footer>

        <p>

            © 2026 Budget Planner | Developed by Phan Thùy Linh

        </p>

    </footer>

    <!-- JavaScript -->

    <script src="data.js"></script>

    <script src="script.js"></script>

</body>

</html>
